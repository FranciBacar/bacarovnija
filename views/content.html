<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urejevalnik vsebine — Bač.art</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/assets/mark-dark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F4ECDD;--card:#FBF7EE;--walnut:#241D16;--terra:#B4502B;--ink:#2E251C;--muted:#7A6B58;--line:rgba(46,37,28,.12)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hanken Grotesk',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;padding-bottom:80px}
  header{background:var(--walnut);color:#F4ECDD;position:sticky;top:0;z-index:20}
  .hin{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 20px;flex-wrap:wrap}
  .hin img{height:30px}
  .hgroup{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{font-family:inherit;cursor:pointer;border:none;border-radius:100px;font-weight:700;padding:10px 18px;font-size:14px}
  .btn-save{background:var(--terra);color:#F7EFE0}
  .btn-save:hover{background:#c95c33}
  .btn-out{background:transparent;border:1.5px solid rgba(244,236,221,.3);color:#F4ECDD;text-decoration:none;display:inline-block}
  .btn-out:hover{border-color:#D98A4E;color:#D98A4E}
  main{max-width:920px;margin:0 auto;padding:22px 20px 40px}
  .intro{color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.5}
  details.group{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
  details.group>summary{cursor:pointer;list-style:none;padding:16px 20px;font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;color:var(--walnut);display:flex;justify-content:space-between;align-items:center}
  details.group>summary::-webkit-details-marker{display:none}
  details.group>summary::after{content:"+";color:var(--terra);font-size:20px}
  details.group[open]>summary::after{content:"–"}
  .group-body{padding:6px 20px 20px}
  .fld{margin-bottom:14px}
  .fld>label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
  .fld input[type=text],.fld textarea{width:100%;font-family:inherit;font-size:14.5px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  .fld textarea{resize:vertical;min-height:64px;line-height:1.5}
  .fld input:focus,.fld textarea:focus{outline:none;border-color:var(--terra)}
  .hint{font-size:11.5px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0}
  .toggle{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .toggle:last-child{border-bottom:none}
  .toggle input{width:20px;height:20px;accent-color:var(--terra)}
  .toggle label{font-weight:600;font-size:15px;color:var(--ink)}
  .list{display:flex;flex-direction:column;gap:10px}
  .litem{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff}
  .litem-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .litem-n{font-weight:700;font-size:13px;color:var(--muted)}
  .srow{display:flex;gap:8px;align-items:center}
  .srow input{flex:1}
  .mini{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--ink)}
  .mini:hover{border-color:var(--terra);color:var(--terra)}
  .mini.add{align-self:flex-start;border-style:dashed;color:var(--terra)}
  .mini.danger{color:#b33;border-color:transparent}
  .mini.danger:hover{border-color:#b33}
  .imgrow{display:flex;gap:12px;align-items:flex-start}
  .imgprev{width:84px;height:84px;object-fit:cover;border-radius:10px;background:#eee;border:1px solid var(--line);flex:0 0 auto}
  .imgcol{flex:1;display:flex;flex-direction:column;gap:8px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--walnut);color:#F4ECDD;padding:13px 24px;border-radius:100px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.3);transition:transform .3s;z-index:50}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:#9b2c12}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:rgba(244,236,221,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 20px;display:flex;justify-content:center;gap:12px;z-index:30}
  .savebar .btn-save{padding:12px 32px;font-size:15px}
  .loading{padding:60px 20px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="hin">
    <img src="/assets/logo-cream.png" alt="Bač.art">
    <div class="hgroup">
      <a href="/admin" class="btn btn-out">← Prijave</a>
      <a href="/" target="_blank" class="btn btn-out">Predogled ↗</a>
      <form method="POST" action="/admin/logout" style="margin:0"><button class="btn btn-out">Odjava</button></form>
    </div>
  </div>
</header>
<main>
  <div class="intro">Tukaj urejaš vsebino spletne strani. Spremeni besedila, datume in slike, na koncu pa klikni <b>Shrani spremembe</b> — sprememba je takoj v živo. Polja z oznako »lahko HTML« dovolijo povezave in odebeljeno besedilo.</div>
  <div id="app"><div class="loading">Nalagam vsebino …</div></div>
</main>
<div class="savebar">
  <button class="btn btn-save" id="saveBtn">Shrani spremembe</button>
</div>
<div class="toast" id="toast"></div>

<script>
var root=null;

function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function toast(msg,err){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(function(){t.className='toast';},2600);}

function field(obj,key,label,kind,hint){
  var w=el('div','fld');
  var lab=el('label',null,label+(hint?' <span class="hint">'+hint+'</span>':''));
  w.appendChild(lab);
  var inp;
  if(kind==='area'){inp=el('textarea');inp.value=obj[key]||'';}
  else{inp=document.createElement('input');inp.type='text';inp.value=obj[key]==null?'':obj[key];}
  inp.addEventListener('input',function(){obj[key]=inp.value;});
  w.appendChild(inp);
  return w;
}

function imageField(obj,key,label){
  var w=el('div','fld');w.appendChild(el('label',null,label));
  var row=el('div','imgrow');
  var prev=el('img','imgprev');if(obj[key])prev.src=obj[key];
  var col=el('div','imgcol');
  var inp=document.createElement('input');inp.type='text';inp.value=obj[key]||'';
  inp.addEventListener('input',function(){obj[key]=inp.value;prev.src=inp.value;});
  var file=document.createElement('input');file.type='file';file.accept='image/*';file.style.display='none';
  var btn=el('button','mini','📷 Naloži novo sliko');btn.type='button';
  btn.addEventListener('click',function(){file.click();});
  file.addEventListener('change',function(){
    var f=file.files[0];if(!f)return;
    var rd=new FileReader();
    rd.onload=function(){
      btn.textContent='Nalagam …';btn.disabled=true;
      fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:f.name,dataUrl:rd.result})})
      .then(function(r){return r.json();}).then(function(j){
        btn.disabled=false;btn.textContent='📷 Naloži novo sliko';
        if(j.ok){obj[key]=j.url;inp.value=j.url;prev.src=j.url;toast('Slika naložena');}
        else toast(j.error||'Napaka pri nalaganju',true);
      }).catch(function(){btn.disabled=false;btn.textContent='📷 Naloži novo sliko';toast('Napaka pri nalaganju',true);});
    };
    rd.readAsDataURL(f);
  });
  col.appendChild(inp);col.appendChild(btn);col.appendChild(file);
  row.appendChild(prev);row.appendChild(col);w.appendChild(row);
  return w;
}

function stringList(arr,hint){
  var box=el('div','list');
  function redraw(){
    box.innerHTML='';
    arr.forEach(function(v,i){
      var row=el('div','srow');
      var inp=document.createElement('input');inp.type='text';inp.value=v;
      inp.addEventListener('input',function(){arr[i]=inp.value;});
      var del=el('button','mini danger','×');del.type='button';
      del.addEventListener('click',function(){arr.splice(i,1);redraw();});
      row.appendChild(inp);row.appendChild(del);box.appendChild(row);
    });
    var add=el('button','mini add','+ Dodaj');add.type='button';
    add.addEventListener('click',function(){arr.push('');redraw();});
    box.appendChild(add);
  }
  if(hint)box.appendChild(el('div','fld','<span class="hint">'+hint+'</span>'));
  redraw();return box;
}

function listEditor(arr,name,fieldsFn,emptyFn){
  var box=el('div','list');
  function redraw(){
    box.innerHTML='';
    arr.forEach(function(item,idx){
      var card=el('div','litem');
      var head=el('div','litem-h');
      head.appendChild(el('span','litem-n',name+' '+(idx+1)));
      var del=el('button','mini danger','Izbriši');del.type='button';
      del.addEventListener('click',function(){arr.splice(idx,1);redraw();});
      head.appendChild(del);card.appendChild(head);
      fieldsFn(item).forEach(function(f){card.appendChild(f);});
      box.appendChild(card);
    });
    var add=el('button','mini add','+ Dodaj '+name.toLowerCase());add.type='button';
    add.addEventListener('click',function(){arr.push(emptyFn());redraw();});
    box.appendChild(add);
  }
  redraw();return box;
}

function group(title,buildFn){
  var d=document.createElement('details');d.className='group';
  var s=document.createElement('summary');s.textContent=title;d.appendChild(s);
  var body=el('div','group-body');buildFn(body);d.appendChild(body);
  return d;
}

function build(){
  var app=document.getElementById('app');app.innerHTML='';
  var c=root;

  // SPLOŠNO
  app.appendChild(group('Splošno (naslov, SEO, Analytics)',function(b){
    b.appendChild(field(c.seo,'title','Naslov strani (SEO)'));
    b.appendChild(field(c.seo,'description','Opis strani (SEO)','area'));
    b.appendChild(field(c.seo,'ogImage','Slika za deljenje (pot)'));
    b.appendChild(field(c,'gaId','Google Analytics ID'));
    b.appendChild(field(c.nav,'cta','Gumb v meniju'));
  }));

  // HERO
  app.appendChild(group('Naslovni del (Hero)',function(b){
    b.appendChild(field(c.hero,'eyebrow','Mala oznaka zgoraj'));
    b.appendChild(field(c.hero,'titleHtml','Glavni naslov','area','lahko HTML — <span class="hl">…</span> obarva oranžno'));
    b.appendChild(field(c.hero,'subHtml','Podnaslov','area','lahko HTML'));
    b.appendChild(field(c.hero,'ctaPrimary','Glavni gumb'));
    b.appendChild(field(c.hero,'ctaSecondary','Drugi gumb'));
    b.appendChild(el('div','fld','<label>Značke zaupanja</label>'));
    b.appendChild(stringList(c.hero.trust));
    b.appendChild(imageField(c.hero,'image','Naslovna slika'));
    b.appendChild(field(c.hero,'imageAlt','Opis naslovne slike (za dostopnost)'));
    b.appendChild(field(c.hero.priceBadge,'label','Značka cene — oznaka'));
    b.appendChild(field(c.hero.priceBadge,'amount','Značka cene — znesek'));
    b.appendChild(field(c.hero.priceBadge,'note','Značka cene — opomba'));
  }));

  // SEKCIJE
  app.appendChild(group('Vklop / izklop sekcij',function(b){
    var names={agitacija:'Uvodno vprašanje (Zakaj)',program:'Program',koristi:'Koristi',mnenja:'Mnenja',galerija:'Galerija',ponudba:'Ponudba in cena',faq:'Pogosta vprašanja'};
    Object.keys(names).forEach(function(k){
      var t=el('div','toggle');
      var inp=document.createElement('input');inp.type='checkbox';inp.checked=!!c.sections[k];inp.id='sec_'+k;
      inp.addEventListener('change',function(){c.sections[k]=inp.checked;});
      var lab=document.createElement('label');lab.htmlFor='sec_'+k;lab.textContent=names[k];
      t.appendChild(inp);t.appendChild(lab);b.appendChild(t);
    });
  }));

  // AGITACIJA
  app.appendChild(group('Uvodno vprašanje (Zakaj)',function(b){
    b.appendChild(field(c.agitacija,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.agitacija,'h2','Vprašanje (naslov)','area'));
    b.appendChild(field(c.agitacija,'p','Besedilo','area'));
  }));

  // PROGRAM
  app.appendChild(group('Program',function(b){
    b.appendChild(field(c.program,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.program,'h2','Naslov'));
    b.appendChild(field(c.program,'introHtml','Uvodni odstavek','area','lahko HTML'));
    b.appendChild(el('div','fld','<label>Kartice programa</label>'));
    b.appendChild(listEditor(c.program.cards,'Kartica',function(it){
      return [field(it,'idx','Številka'),field(it,'title','Naslov'),field(it,'body','Opis','area')];
    },function(){return{idx:'',title:'',body:''};}));
  }));

  // KORISTI
  app.appendChild(group('Koristi',function(b){
    b.appendChild(field(c.koristi,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.koristi,'h2','Naslov'));
    b.appendChild(el('div','fld','<label>Kartice koristi</label>'));
    b.appendChild(listEditor(c.koristi.cards,'Korist',function(it){
      return [field(it,'title','Naslov'),field(it,'bodyHtml','Opis','area','lahko HTML')];
    },function(){return{title:'',bodyHtml:''};}));
  }));

  // MNENJA
  app.appendChild(group('Mnenja',function(b){
    b.appendChild(field(c.mnenja,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.mnenja,'h2','Naslov'));
    b.appendChild(listEditor(c.mnenja.items,'Mnenje',function(it){
      return [field(it,'quote','Besedilo mnenja','area'),field(it,'name','Ime'),field(it,'role','Vloga (npr. udeleženka delavnice)'),field(it,'initials','Začetnici (npr. VJ)')];
    },function(){return{quote:'',name:'',role:'udeleženec delavnice',initials:''};}));
  }));

  // GALERIJA
  app.appendChild(group('Galerija',function(b){
    b.appendChild(field(c.galerija,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.galerija,'h2','Naslov'));
    b.appendChild(field(c.galerija,'subtitleHtml','Podnaslov','area','lahko HTML'));
    b.appendChild(el('div','fld','<label>Slike galerije</label>'));
    b.appendChild(listEditor(c.galerija.images,'Slika',function(it){
      return [imageField(it,'src','Slika'),field(it,'alt','Opis slike (dostopnost)'),field(it,'credit','Avtorstvo (napis na sliki)')];
    },function(){return{src:'',alt:'',credit:'Foto: Bač.art'};}));
  }));

  // PONUDBA
  app.appendChild(group('Ponudba in cena',function(b){
    b.appendChild(field(c.ponudba,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.ponudba,'h2','Naslov'));
    b.appendChild(field(c.ponudba,'inclTitle','Naslov seznama "Vključeno"'));
    b.appendChild(el('div','fld','<label>Vključeno v ceno <span class="hint">(vsaka vrstica lahko HTML)</span></label>'));
    b.appendChild(stringList(c.ponudba.included));
    b.appendChild(field(c.ponudba.price,'tag','Značka (npr. Zgodnja prijava −20 %)'));
    b.appendChild(field(c.ponudba.price,'now','Cena zdaj'));
    b.appendChild(field(c.ponudba.price,'was','Prečrtana cena'));
    b.appendChild(field(c.ponudba.price,'noteHtml','Opomba pod ceno','area','lahko HTML'));
    b.appendChild(field(c.ponudba.price,'urgency','Opozorilo o mestih'));
    b.appendChild(field(c.ponudba.price,'cta','Gumb'));
    b.appendChild(field(c.ponudba.guarantee,'h3','Garancija — naslov'));
    b.appendChild(field(c.ponudba.guarantee,'p','Garancija — besedilo','area'));
    b.appendChild(el('div','fld','<label>Popusti</label>'));
    b.appendChild(listEditor(c.ponudba.guarantee.items,'Popust',function(it){
      return [field(it,'label','Naziv'),field(it,'value','Vrednost')];
    },function(){return{label:'',value:''};}));
    b.appendChild(field(c.ponudba,'mobileNoteHtml','Opomba o mobilni delavnici','area','lahko HTML'));
    b.appendChild(field(c.ponudba.termini,'h3','Termini — naslov'));
    b.appendChild(field(c.ponudba.termini,'p','Termini — podnaslov (ura)'));
    b.appendChild(el('div','fld','<label>Datumi delavnic <span class="hint">(prikažejo se tudi v spustnem meniju ob prijavi)</span></label>'));
    b.appendChild(listEditor(c.ponudba.termini.dates,'Termin',function(it){
      return [field(it,'dow','Dan (npr. Sobota)'),field(it,'day','Datum (npr. 20. 6.)'),field(it,'mon','Mesec (npr. junij)')];
    },function(){return{dow:'Sobota',day:'',mon:''};}));
  }));

  // FAQ
  app.appendChild(group('Pogosta vprašanja',function(b){
    b.appendChild(field(c.faq,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.faq,'h2','Naslov'));
    b.appendChild(listEditor(c.faq.items,'Vprašanje',function(it){
      return [field(it,'q','Vprašanje'),field(it,'aHtml','Odgovor','area','lahko HTML')];
    },function(){return{q:'',aHtml:''};}));
  }));

  // PRIJAVA
  app.appendChild(group('Prijava in kontakt',function(b){
    b.appendChild(field(c.prijava,'eyebrow','Mala oznaka'));
    b.appendChild(field(c.prijava,'h2','Naslov'));
    b.appendChild(field(c.prijava,'lead','Besedilo nad obrazcem','area'));
    b.appendChild(el('div','fld','<label>Kontaktne kartice</label>'));
    b.appendChild(listEditor(c.prijava.contacts,'Kontakt',function(it){
      return [field(it,'ct','Oznaka (npr. E-pošta)'),field(it,'cv','Vrednost'),field(it,'href','Povezava (mailto:, tel:, https:)')];
    },function(){return{ct:'',cv:'',href:'',blank:true};}));
  }));

  // FOOTER
  app.appendChild(group('Noga strani',function(b){
    b.appendChild(field(c.footer,'blurbHtml','Kratek opis','area','lahko HTML'));
    b.appendChild(field(c.footer,'email','E-pošta'));
    b.appendChild(field(c.footer,'phone','Telefon'));
    b.appendChild(field(c.footer,'facebook','Facebook povezava'));
    b.appendChild(field(c.footer,'address','Naslov'));
  }));
}

function load(){
  fetch('/api/content').then(function(r){
    if(r.status===401){location.href='/admin/login';return null;}
    return r.json();
  }).then(function(j){ if(j&&j.ok){root=j.content;build();} });
}

document.getElementById('saveBtn').addEventListener('click',function(){
  var btn=this;btn.disabled=true;btn.textContent='Shranjujem …';
  fetch('/api/content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:root})})
  .then(function(r){return r.json();}).then(function(j){
    btn.disabled=false;btn.textContent='Shrani spremembe';
    if(j.ok){root=j.content;toast('Shranjeno — sprememba je v živo ✓');}
    else toast(j.error||'Napaka pri shranjevanju',true);
  }).catch(function(){btn.disabled=false;btn.textContent='Shrani spremembe';toast('Napaka pri shranjevanju',true);});
});

load();
</script>
</body>
</html>
